<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTEC-FOR340 | Game Portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #ff2449;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .portfolio-grid {
            display: grid;
            /* Changed to 1fr to force a single column at any width */
            grid-template-columns: 1fr; 
            gap: 30px;
            max-width: 600px; /* Reduced max-width to keep the list looking centered and clean */
            width: 100%;
            justify-items: center;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            box-sizing: border-box;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 15px 40px rgba(255, 36, 73, 0.15);
        }

        .iframe-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            line-height: 0;
            background: #1a1c23;
        }

        .iframe-container iframe {
            width: 100% !important;
            /* Maintains the itch.io widget height */
            height: 167px;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 14px;
            display: block;
            letter-spacing: 2px;
        }

        footer {
            margin-top: auto;
            padding: 60px 0 20px;
            color: var(--text-dim);
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .project-card { padding: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>ISTEC-FOR340</h1>
        <p style="color: var(--text-dim);">Cinemachine Technical Examples</p>
    </header>

    <div class="portfolio-grid">
        
        <div class="project-card">
            <span class="label">Exercício 1</span>
            <div class="iframe-container">
                <iframe frameborder="0" src="https://itch.io/embed/4492461?bg_color=1a1c23&amp;fg_color=eeeeee&amp;link_color=fa5c5c" width="552" height="167">
                    <a href="https://istec-for340.itch.io/linearcam-example">LinearCam Example</a>
                </iframe>
            </div>
        </div>

        <div class="project-card">
            <span class="label">Exercício 2</span>
            <div class="iframe-container">
                <iframe frameborder="0" src="https://itch.io/embed/4492933?bg_color=1a1c23&amp;fg_color=eeeeee&amp;link_color=fa5c5c" width="552" height="167">
                    <a href="https://istec-for340.itch.io/enquadramentos">Enquadramentos</a>
                </iframe>
            </div>
        </div>

    </div>

    <footer>
        &copy; 2026 ISTEC-FOR340 &bull; Built by Jorge Forero
    </footer>

</body>
</html>
